<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Replica</title>
<style>
  @page {
    size: auto;
    margin: 10mm;
  }

  body {
    background: #f5f5f5;
    font-family: 'Courier New', Courier, monospace;
  }

  .receipt {
    width: 280px;
    margin: 20px auto;
    background: #fff;
    padding: 10px 12px;
    color: #000;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
  }

  .center { text-align: center; }
  .bold   { font-weight: bold; }

  .divider {
    border-top: 1px dashed #000;
    margin: 8px 0;
  }

  .row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
  }

  .header { font-size: 15px; font-weight: bold; }
  .small  { font-size: 12px; }

  .table { width: 100%; font-size: 13px; }
  .table th, .table td { text-align: left; padding: 2px 0; }
  .right  { text-align: right; }
  .total  { font-size: 14px; font-weight: bold; }

  /* ── Inline editable field inputs ── */
  .fi {
    font-family: 'Courier New', Courier, monospace;
    border: none;
    border-bottom: 1px dashed transparent;
    background: transparent;
    color: #000;
    padding: 0;
    margin: 0;
    outline: none;
  }
  .fi:hover  { border-bottom-color: #bbb; }
  .fi:focus  { border-bottom: 1px dashed #000; background: #fffde7; }
  .fi-center { text-align: center; display: block; width: 100%; }
  .fi-header { font-size: 15px; font-weight: bold; }
  .fi-small  { font-size: 12px; }
  .fi-bold   { font-weight: bold; }

  /* ── Table inline inputs ── */
  .tbl-input {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    font-weight: bold;
    border: none;
    border-bottom: 1px dashed #ccc;
    background: transparent;
    color: #000;
    padding: 0;
    outline: none;
  }
  .tbl-input:focus  { border-bottom: 1px solid #000; background: #fffde7; }
  .input-qty   { width: 26px;  text-align: right; }
  .input-price { width: 48px;  text-align: right; }

  /* ── Wrapping contenteditable item name ── */
  .tbl-ce {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    font-weight: bold;
    display: block;
    max-width: 110px;
    word-break: break-word;
    white-space: normal;
    outline: none;
    border-bottom: 1px dashed transparent;
    cursor: text;
  }
  .tbl-ce:hover { border-bottom-color: #bbb; }
  .tbl-ce:focus { border-bottom: 1px dashed #000; background: #fffde7; }

  /* bold amount column */
  #itemsTbody td { font-weight: bold; }

  /* Delete button (screen only) */
  .del-btn {
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    background: none;
    border: 1px solid #aaa;
    color: #666;
    cursor: pointer;
    padding: 0 3px;
    line-height: 1.4;
  }
  .del-btn:hover { background: #eee; }
  .delete-col { padding-left: 3px !important; }

  /* ── Add item control (screen only) ── */
  .controls {
    width: 280px;
    margin: 0 auto 6px auto;
    text-align: center;
  }
  .ctrl-btn {
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    background: #000;
    color: #fff;
    border: none;
    padding: 3px 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .ctrl-btn:hover { background: #333; }

  /* ── Print button (screen only) ── */
  .print-btn-wrap {
    width: 280px;
    margin: 0 auto 6px auto;
    text-align: center;
  }
  .print-btn {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    background: #000;
    color: #fff;
    border: none;
    padding: 5px 18px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .print-btn:hover { background: #333; }

  /* ── contenteditable merchant name ── */
  .ce-field {
    outline: none;
    border-bottom: 1px dashed transparent;
    cursor: text;
    word-break: break-word;
  }
  .ce-field:hover { border-bottom-color: #bbb; }
  .ce-field:focus { border-bottom: 1px dashed #000; background: #fffde7; }

  @media print {
    body { background: none; }
    .print-btn-wrap,
    .controls,
    .delete-col { display: none !important; }
    .receipt    { box-shadow: none; margin: 0; }
    .fi, .tbl-input, .tbl-ce {
      border: none;
      background: transparent;
    }
    .ce-field { border: none; background: transparent; }
  }
</style>
</head>
<body>

<!-- Print button -->
<div class="print-btn-wrap">
  <button class="print-btn" onclick="window.print()">PRINT / SAVE AS PDF</button>
</div>

<!-- Add item control -->
<div class="controls">
  <button class="ctrl-btn" onclick="addItem()">+ Add Item</button>
</div>

<!-- Receipt -->
<div class="receipt">

  <!-- Merchant name (wraps naturally) -->
  <div class="center header ce-field" contenteditable="true">Sakshi Foods &amp; Beverages - Sector-62</div>

  <!-- Address lines -->
  <div class="center small">
    <input class="fi fi-center fi-small" value="Ground Floor, Tower-B, Good Earth">
  </div>
  <div class="center small">
    <input class="fi fi-center fi-small" value="Trade Tower, Sec-62, Gurugram,">
  </div>
  <div class="center small">
    <input class="fi fi-center fi-small" value="Haryana - 122001">
  </div>
  <div class="center small">
    <input class="fi fi-center fi-small" value="GSTIN - 06AEGPK9431D1ZO">
  </div>
  <div class="center small">
    <input class="fi fi-center fi-small" value="Mobile no. 9220337871, 9220337870">
  </div>

  <div class="divider"></div>

  <!-- Customer name -->
  <div class="small">Name:&nbsp;<input class="fi fi-small" style="width:190px" value=""></div>

  <div class="divider"></div>

  <!-- Date / Order type -->
  <div class="row small">
    <span>Date:&nbsp;<input class="fi fi-small" style="width:58px" value="22/04/26"></span>
    <span><input class="fi fi-small fi-bold" style="width:65px; text-align:right" value="Pick Up"></span>
  </div>

  <!-- Time / Bill No -->
  <div class="row small">
    <span><input class="fi fi-small" style="width:65px" value="01:23 PM"></span>
    <span>Bill No.:&nbsp;<input class="fi fi-small" style="width:38px; text-align:right" value="1780"></span>
  </div>

  <!-- Cashier -->
  <div class="row small">
    <span>Cashier:&nbsp;<input class="fi fi-small" style="width:100px" value="biller"></span>
  </div>

  <div class="divider"></div>

  <!-- Items table -->
  <table class="table">
    <thead>
      <tr class="bold">
        <th>Item</th>
        <th class="right">Qty.</th>
        <th class="right">Price</th>
        <th class="right">Amt</th>
        <th class="delete-col"></th>
      </tr>
    </thead>
    <tbody id="itemsTbody"></tbody>
  </table>

  <div class="divider"></div>

  <div class="row small">
    <span>Total Qty: <span id="totalQty">0</span></span>
    <span>Sub Total <span id="subTotal">0.00</span></span>
  </div>

  <div class="divider"></div>

  <div class="row small">
    <span>
      <input class="fi fi-small" id="cgstName" style="width:32px" value="CGST">
      &nbsp;@&nbsp;<input class="fi fi-small" id="cgstPct" style="width:24px; text-align:right" value="2.5" oninput="recalc()">%
    </span>
    <span id="cgstAmt">0.00</span>
  </div>
  <div class="row small">
    <span>
      <input class="fi fi-small" id="sgstName" style="width:32px" value="SGST">
      &nbsp;@&nbsp;<input class="fi fi-small" id="sgstPct" style="width:24px; text-align:right" value="2.5" oninput="recalc()">%
    </span>
    <span id="sgstAmt">0.00</span>
  </div>

  <div class="divider"></div>

  <div class="row total">
    <span>Grand Total</span>
    <span id="grandTotal">&#8377; 0.00</span>
  </div>

  <div class="divider"></div>

  <div class="center small">Thanks</div>

</div>

<script>
  const items = [
    { name: 'Rasam Papad',                        qty: 1, price: 100.00 },
    { name: 'Mixed Vegetable Uthappam',            qty: 1, price: 250.00 },
    { name: 'Mysore Pak (1 Pc)',                   qty: 1, price:  90.00 },
    { name: 'Malabar Paratha With Kurma',          qty: 1, price: 235.00 },
    { name: "Mysore Masala Dosa (Chef's Special)", qty: 5, price: 225.00 },
  ];

  function esc(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function renderTable() {
    const tbody = document.getElementById('itemsTbody');
    tbody.innerHTML = '';
    items.forEach(function(item, i) {
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td><span class="tbl-ce" contenteditable="true"' +
            ' oninput="items[' + i + '].name = this.textContent">' + esc(item.name) + '</span></td>' +
        '<td class="right"><input class="tbl-input input-qty" type="number" min="0" step="1"' +
            ' value="' + item.qty + '" oninput="recalc()"></td>' +
        '<td class="right"><input class="tbl-input input-price" type="number" min="0" step="0.01"' +
            ' value="' + item.price.toFixed(2) + '" oninput="recalc()"></td>' +
        '<td class="right amount-cell">' + (item.qty * item.price).toFixed(2) + '</td>' +
        '<td class="delete-col"><button class="del-btn" onclick="deleteItem(' + i + ')">x</button></td>';
      tbody.appendChild(tr);
    });
    recalc();
  }

  function recalc() {
    var subtotal = 0, totalQty = 0;
    document.querySelectorAll('#itemsTbody tr').forEach(function(row, i) {
      var qty   = parseFloat(row.querySelector('.input-qty').value)   || 0;
      var price = parseFloat(row.querySelector('.input-price').value) || 0;
      var amount = qty * price;
      row.querySelector('.amount-cell').textContent = amount.toFixed(2);
      subtotal += amount;
      totalQty += qty;
      if (items[i]) { items[i].qty = qty; items[i].price = price; }
    });
    var cgstPct = parseFloat(document.getElementById('cgstPct').value) || 0;
    var sgstPct = parseFloat(document.getElementById('sgstPct').value) || 0;
    var cgst  = subtotal * cgstPct / 100;
    var sgst  = subtotal * sgstPct / 100;
    var grand = subtotal + cgst + sgst;
    document.getElementById('totalQty').textContent   = totalQty;
    document.getElementById('subTotal').textContent   = subtotal.toFixed(2);
    document.getElementById('cgstAmt').textContent    = cgst.toFixed(2);
    document.getElementById('sgstAmt').textContent    = sgst.toFixed(2);
    document.getElementById('grandTotal').textContent = '₹ ' + grand.toFixed(2);
  }

  function deleteItem(i) {
    items.splice(i, 1);
    renderTable();
  }

  function addItem() {
    items.push({ name: 'New Item', qty: 1, price: 0.00 });
    renderTable();
    var rows = document.querySelectorAll('#itemsTbody tr');
    var last = rows[rows.length - 1];
    if (last) last.querySelector('.input-name').focus();
  }

  renderTable();
</script>

</body>
</html>
